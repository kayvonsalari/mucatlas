<svg width="100%" viewBox="0 0 680 800" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MucAtlas architecture diagram</title>
<desc>Four-layer architecture: Knowledge Layer, Retrieval Layer, Agent Layer (five agents in sequence), and Governance Layer, with Privatemode confidential computing wrapping all layers and MucGPT/MCP as Phase 2 integration.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Privatemode outer boundary -->
<rect x="20" y="28" width="640" height="672" rx="16" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
<text x="340" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#534AB7">Privatemode — confidential computing (Edgeless Systems) · all inference in encrypted enclaves</text>

<!-- Layer 1: Knowledge Layer -->
<rect x="36" y="36" width="608" height="76" rx="10" fill="#F1EFE8" stroke="#73726c" stroke-width="0.5"/>
<text x="340" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Knowledge layer</text>
<text x="340" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5F5E5A">Ingests all internal sources continuously · nightly re-index</text>

<!-- Knowledge source pills -->
<rect x="52" y="90" width="110" height="14" rx="4" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="107" y="101" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#444441">File server (SMB)</text>

<rect x="172" y="90" width="110" height="14" rx="4" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="227" y="101" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#444441">SharePoint / wiki</text>

<rect x="292" y="90" width="110" height="14" rx="4" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="347" y="101" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#444441">Email archive</text>

<rect x="412" y="90" width="110" height="14" rx="4" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="467" y="101" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#444441">Scanned PDFs</text>

<rect x="532" y="90" width="96" height="14" rx="4" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="580" y="101" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#444441">LOB systems</text>

<!-- Arrow -->
<line x1="340" y1="112" x2="340" y2="138" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Layer 2: Retrieval Layer -->
<rect x="36" y="140" width="608" height="76" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#04342C">Retrieval layer</text>
<text x="340" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0F6E56">Hybrid search · BM25 keyword + ANN semantic vector · Qwen3-Embedding 4B (32k context)</text>

<!-- Retrieval pills -->
<rect x="52" y="192" width="170" height="14" rx="4" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="137" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#04342C">BM25 keyword search</text>

<rect x="236" y="192" width="198" height="14" rx="4" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="335" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#04342C">ANN semantic vector search</text>

<rect x="448" y="192" width="186" height="14" rx="4" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="541" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#04342C">Reranker (cross-encoder sidecar)</text>

<!-- Arrow -->
<line x1="340" y1="216" x2="340" y2="242" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Layer 3: Agent Layer header -->
<rect x="36" y="244" width="608" height="28" rx="10" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#26215C">Agent layer — five agents in sequence · re-queries if retrieval confidence is low</text>

<!-- Agent 1: Research -->
<rect x="36" y="280" width="106" height="84" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="89" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#26215C">Research</text>
<text x="89" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3C3489">Searches all</text>
<text x="89" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3C3489">sources; ranks</text>
<text x="89" y="356" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3C3489">by relevance</text>

<line x1="142" y1="322" x2="154" y2="322" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Agent 2: Prüf -->
<rect x="156" y="280" width="106" height="84" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="209" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#26215C">Prüf-Agent</text>
<text x="209" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3C3489">Validates doc</text>
<text x="209" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3C3489">currency; links</text>
<text x="209" y="356" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3C3489">legal sources</text>

<line x1="262" y1="322" x2="274" y2="322" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Agent 3: Conflict (coral) -->
<rect x="276" y="280" width="128" height="84" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#4A1B0C">Conflict Agent</text>
<text x="340" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#712B13">Detects source</text>
<text x="340" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#712B13">contradictions;</text>
<text x="340" y="356" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#712B13">surfaces to user</text>

<line x1="404" y1="322" x2="416" y2="322" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Agent 4: Synthesis (teal) -->
<rect x="418" y="280" width="106" height="84" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="471" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#04342C">Synthesis</text>
<text x="471" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#085041">Generates cited</text>
<text x="471" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#085041">answer with</text>
<text x="471" y="356" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#085041">inline sources</text>

<line x1="524" y1="322" x2="536" y2="322" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Agent 5: Risk (amber) -->
<rect x="538" y="280" width="106" height="84" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="591" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#412402">Risk Agent</text>
<text x="591" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#633806">Flags low-conf</text>
<text x="591" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#633806">answers; flags</text>
<text x="591" y="356" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#633806">human review</text>

<!-- Arrow down -->
<line x1="340" y1="364" x2="340" y2="390" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Model stack -->
<rect x="36" y="372" width="608" height="20" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="386" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5F5E5A">Model stack · gpt-oss-120b (primary reasoning) · Qwen3-Embedding 4B (vectors) · Gemma 3 27B (multimodal / scanned PDFs)</text>

<!-- Arrow -->
<line x1="340" y1="392" x2="340" y2="418" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Layer 4: Governance -->
<rect x="36" y="420" width="608" height="76" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#042C53">Governance layer</text>
<text x="340" y="464" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#185FA5">Full source citations · confidence indicators · audit log · GDPR compliant · no personal data in index</text>

<!-- Governance pills -->
<rect x="52" y="472" width="132" height="14" rx="4" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
<text x="118" y="483" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#042C53">LDAP / AD auth</text>

<rect x="198" y="472" width="132" height="14" rx="4" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
<text x="264" y="483" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#042C53">Full audit trail</text>

<rect x="344" y="472" width="132" height="14" rx="4" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
<text x="410" y="483" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#042C53">Feedback queue</text>

<rect x="490" y="472" width="138" height="14" rx="4" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
<text x="559" y="483" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#042C53">Nightly re-index</text>

<!-- Arrow dashed to Phase 2 -->
<line x1="340" y1="496" x2="340" y2="522" stroke="#73726c" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

<!-- Phase 2: MucGPT -->
<rect x="36" y="524" width="608" height="56" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="340" y="548" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Phase 2 — MucGPT integration via MCP</text>
<text x="340" y="566" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5F5E5A">MucAtlas exposed as MCP tool · caseworkers access via existing MucGPT interface · no MucGPT core changes</text>

<!-- Legend -->
<rect x="36" y="600" width="608" height="90" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="52" y="620" font-family="system-ui, sans-serif" font-size="11" fill="#5F5E5A">Legend</text>

<rect x="52" y="630" width="12" height="12" rx="2" fill="#AFA9EC"/>
<text x="70" y="641" font-family="system-ui, sans-serif" font-size="11" fill="#444441">Orchestration / primary agents</text>

<rect x="52" y="650" width="12" height="12" rx="2" fill="#F0997B"/>
<text x="70" y="661" font-family="system-ui, sans-serif" font-size="11" fill="#444441">Conflict detection</text>

<rect x="52" y="670" width="12" height="12" rx="2" fill="#5DCAA5"/>
<text x="70" y="681" font-family="system-ui, sans-serif" font-size="11" fill="#444441">Retrieval &amp; synthesis</text>

<rect x="260" y="630" width="12" height="12" rx="2" fill="#EF9F27"/>
<text x="278" y="641" font-family="system-ui, sans-serif" font-size="11" fill="#444441">Risk / confidence flagging</text>

<rect x="260" y="650" width="12" height="12" rx="2" fill="#85B7EB"/>
<text x="278" y="661" font-family="system-ui, sans-serif" font-size="11" fill="#444441">Governance &amp; compliance</text>

<rect x="260" y="670" width="12" height="12" rx="2" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="278" y="681" font-family="system-ui, sans-serif" font-size="11" fill="#444441">Privatemode boundary / Phase 2 (dashed)</text>

</svg>
